    <style>
      body {
        margin: 0;
        background-color: #0F0F13;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        z-index: 999999;
        background: linear-gradient(135deg, #3A2DFF 0%, #00D4FF 100%);
        transition: opacity 0.5s ease-out;
      }
      .splash-logo {
        width: 140px;
        height: auto;
        animation: pulseLogo 2.5s infinite ease-in-out;
        object-fit: contain;
      }
      @keyframes pulseLogo {
        0% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.08);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
      }
      .splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #00F0FF;
        border-radius: 50%;
        animation: spinRotate 1s linear infinite;
      }
      @keyframes spinRotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      // Avoid document.write which can be blocked by browsers and cause white screens
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      if (!isStandalone) {
        window.__SKIP_SPLASH = true;
        // Inject style directly to guarantee it applies
        var style = document.createElement('style');
        style.innerHTML = '#app-loader { display: none !important; opacity: 0 !important; visibility: hidden !important; z-index: -1 !important; }';
        document.head.appendChild(style);
      }
    </script>
