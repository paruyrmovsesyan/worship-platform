<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-v3.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#05050A" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Worship Platform" />
    
    <!-- Anti-Cache Meta Tags to force PWA refresh -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="manifest" href="/manifest.json?v=5" />
    <title>Worship Platform</title>
    <meta name="description" content="Worship Platform - Equip your worship team with chord charts, setlists, and collaboration tools." />
    <script src="/site_guard.js?v=8" defer></script>
  </head>
  <body>
    <div id="root">
      <style>
        #app-loader { position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999999;background:linear-gradient(180deg, #0a0f1d, #080c17); }
        .modern-spinner { width: 64px; height: 64px; position: relative; border-radius: 50%; background: conic-gradient(from 0deg, #B100FF, #00C6FF, #0072FF, #B100FF); animation: spinRotate 1.5s linear infinite; display: flex; align-items: center; justify-content: center; }
        .modern-spinner::before { content: ''; position: absolute; inset: 4px; background: #0a0f1d; border-radius: 50%; }
        .modern-spinner::after { content: ''; position: absolute; inset: -10px; background: inherit; border-radius: 50%; filter: blur(14px); opacity: 0.6; z-index: -1; }
        @keyframes spinRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
      <div id="app-loader">
        <div class="modern-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
