<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Minimalist Loaders</title>
<style>
  body {
    background-color: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    gap: 80px;
  }

  .loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .label {
    color: #64748b;
    font-size: 14px;
    font-weight: 500;
  }

  /* 1. Smooth Pulse Ring */
  .loader-pulse {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: #3b82f6;
    animation: pulse 1.5s ease-out infinite;
  }

  @keyframes pulse {
    0% {
      transform: scale(0.5);
      opacity: 1;
    }
    100% {
      transform: scale(1.5);
      opacity: 0;
    }
  }

  /* 2. Sleek Spinner */
  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #e2e8f0;
    border-top: 3px solid #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* 3. Bouncing Dots */
  .loader-dots {
    display: flex;
    gap: 6px;
    height: 40px;
    align-items: center;
  }

  .loader-dots div {
    width: 8px;
    height: 8px;
    background-color: #3b82f6;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .loader-dots div:nth-child(1) { animation-delay: -0.32s; }
  .loader-dots div:nth-child(2) { animation-delay: -0.16s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

</style>
</head>
<body>

  <div class="loader-container">
    <div class="loader-pulse"></div>
    <div class="label">Pulse Ring</div>
  </div>

  <div class="loader-container">
    <div class="loader-spinner"></div>
    <div class="label">Sleek Spinner</div>
  </div>

  <div class="loader-container">
    <div class="loader-dots">
      <div></div><div></div><div></div>
    </div>
    <div class="label">Bouncing Dots</div>
  </div>

</body>
</html>
