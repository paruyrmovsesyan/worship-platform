<!doctype html>
<html lang="hy">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wolarm Youth Worship</title>
<link rel="icon" href="wolarm_youth.png" type="image/png">
    <link rel="shortcut icon" type="image/x-icon" href="wolarm_youth.png">
    <meta name="author" content="Wolarm Youth Worship">
    <meta name="icon" content="wolarm_youth.png">
<style>
body{font-family:system-ui,sans-serif;padding:10px;background:#f6f7fb;color:#0f1222;}
input[type="text"]{max-width:400px;width:95%;padding:10px;margin-bottom:12px;border-radius:10px;border:1px solid #dde3ee;}
table{width:100%;border-collapse:collapse;margin-top:12px;}
th,td{padding:10px;border-bottom:1px solid #eef0f6;text-align:left;font-size:14px;}
th{color:#6b7280;font-weight:600;}
button{padding:6px 10px;border:0;border-radius:8px;background:#0b69d6;color:#fff;cursor:pointer;margin:2px;}

.title-cell {
  position: relative;
}

/* Սովորական տեքստ */
.title-text {
  font-weight: 400;
  transition: color 0.3s, font-weight 0.2s;
}

/* «Invisible bold» շերտ — պահում է հաստ տառերի լայնությունը */
.title-text::before {
  content: attr(data-text);
  font-weight: 700; /* հաստ */
  visibility: hidden;
  height: 0;
  display: block;
}

/* Hover-ի ժամանակ տողը bold է դառնում, բայց լայնությունը արդեն պահված է */
tbody tr:hover .title-text {
  font-weight: 700;
  color: #0b69d6;
  
}
tbody tr {
  transition: background 0.3s;
}
tbody tr:hover {
  background: #eef3ff;
}
td.heart-cell {
  text-align: center;       /* Հորիզոնական կենտրոն */
  vertical-align: middle;   /* Ուղղահայաց կենտրոն */
}
.heart-btn{
  color:#666;
  font-size:18px;
  background:none;
  border:none;
  cursor:pointer;
  padding:0;
  transition: color 0.2s, transform 0.2s;
}
.heart-btn.active {
  color:#e63946;
}
.heart-btn.animate {
  transform: scale(1.3);
}
.footer{max-width:1000px;margin:0 auto;position:static;bottom:0;left:0;right:0;height:50px;background:#fff;display:flex;align-items:center;justify-content:center;border-radius:14px;box-shadow:0 -2px 5px rgba(0,0,0,0.05);}

.link-modern {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #ff5f6d, #ffc371);
  color: white;
  font-weight: 600;
  text-decoration: none;
  padding: 12px 22px;
  border-radius: 16px;
  font-family: "Poppins", "Segoe UI", sans-serif;
  font-size: 17px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  transition: all 0.25s ease;
}

.link-modern:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
  background: linear-gradient(135deg, #ff7f50, #ffd86f);
}

.link-modern:active {
  transform: translateY(0);
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
}

#upcomingBox {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 220px;
  background: #ffffff;
  padding: 15px;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  z-index: 9999;
  font-size: 14px;
  animation: fadein 0.3s ease;
}

#upcomingBox h3 {
  margin: 0 0 10px 0;
  font-size: 15px;
  font-weight: 700;
  color: #0b69d6;
}

#upcomingBox ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

#upcomingBox li {
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}

#upcomingBox li:last-child {
  border-bottom: none;
}

/* Փոքր անիմացիա */
@keyframes fadein {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

</style>
</head>
<body>

<h1>Որոնում և երգերի ցուցակ</h1>
<p><a href="favorites.html" class="link-modern">❤ Իմ պահպանած երգերը</a></p>
<div id="upcomingBox">
    <h3>Շուտով 🎵</h3>
    <ul id="upcomingList"></ul>
</div>
<label>Որոնել երգը ըստ անունի</label>
<div style="padding-top: 10px;"> 
  <input type="text" id="searchBox" placeholder="Օր. Մեր սուրբ Աստված">
</div>
<hr>
<h2>Բոլոր պահպանված երգերը</h2>
<p id="songsCount" style="font-weight:600; color:#555;"></p>
<table>
<thead>
<tr><th>Անուն</th><th style="text-align: center;">Հավանել</th></tr>
</thead>
<tbody id="songsTable"></tbody>
</table>
<br><br><br><br><br><br><br><br>
<footer class="footer">
    <p style="text-align: center; font-size: 11px"><b>Wolarm Youth 2025 | PM Studio 2025</b></p>
</footer>

<script>
const tableBody = document.getElementById('songsTable');
let allSongs = [];
let favoriteIds = new Set();

async function loadAllSongs() {
  try {

    // --- Բեռնում ենք սպասվող երգերը (ԱՊԱՀՈՎ ԵՂԱԾ ՎԱՐԻԱՆՏ) ---
    let upcoming = [];
    try {
      const upcomingRes = await fetch('upcoming.php');
      if (upcomingRes.ok) {
        upcoming = await upcomingRes.json();
      }
    } catch (e) {
      console.warn("Upcoming songs loading failed:", e);
    }

    // Ցուցադրում ենք սպասվող երգերի popup-ը ONLY եթե կան
    if (Array.isArray(upcoming)) {
      renderUpcomingFloating(upcoming);
    }

    // --- ԵՐԳԵՐԻ ՑԱՆԿ + ՖԱՎՈՐԻՏՆԵՐ ---
    const [songsRes, favsRes] = await Promise.all([
      fetch('api.php'),
      fetch('favorites_api.php?action=get_favorites')
    ]);

    allSongs = await songsRes.json();
    const favs = await favsRes.json();

    favoriteIds = new Set(favs.map(f => String(f.id)));

    // --- Ցուցադրում ենք ամբողջական երգերի ցանկը ---
    renderSongs(allSongs);

  } catch (err) {
    console.error(err);
  }
}


function renderSongs(songs) {
  tableBody.innerHTML = '';
  songs.forEach(s => {
    const songId = String(s.id);
    const isFav = favoriteIds.has(songId);

    const tr = document.createElement('tr');
    tr.style.cursor = "pointer";
    tr.onclick = () => openSong(songId);

    tr.innerHTML = `
      <td class="title-cell">
     <span class="title-text" data-text="${s.title || ''}">${s.title || ''}</span>
  </td>
      <td class="heart-cell">
        <button class="heart-btn ${isFav ? 'active' : ''}" 
                onclick="event.stopPropagation(); toggleFavorite('${songId}', this)">
          ❤
        </button>
      </td>
    `;

    tableBody.appendChild(tr);
  });
   // 🟦 ԱՅՍՏԵՂ Է ԹՎԻ ՑՈՒՑԱԴՐՈՒՄԸ
  document.getElementById('songsCount').textContent =
    "Ընդհանուր: " + songs.length + " երգ";
}

function renderUpcomingFloating(list) {
  const box = document.getElementById('upcomingList');
  box.innerHTML = '';

  list.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s.title;
    box.appendChild(li);
  });
}


// ❤️ Toggle Favorite
async function toggleFavorite(id, el) {
  try {
    el.classList.add('animate');
    setTimeout(()=> el.classList.remove('animate'), 200); 
    
    const res = await fetch('favorites_api.php?action=toggle_favorite', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({song_id: id})
    });
    const data = await res.json();
    if(data.favorite) {
      favoriteIds.add(String(id));
      el.classList.add('active');
    } else {
      favoriteIds.delete(String(id));
      el.classList.remove('active');
    }
  } catch(err) { console.error(err); }
}

function openSong(id) {
  window.location.href = "song_view.html?id=" + id;
}

// 🔍 Որոնման ֆունկցիա
document.getElementById('searchBox').addEventListener('input', function() {
  const query = this.value.toLowerCase();
  const filtered = allSongs.filter(s => 
    (s.title && s.title.toLowerCase().includes(query)) ||
    (s.tags && s.tags.toLowerCase().includes(query))
  );
  renderSongs(filtered);
});

loadAllSongs();
</script>

</body>
</html>
