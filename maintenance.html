<!doctype html>
<html lang="hy">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#060a18" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Տեխնիկական աշխատանքներ — Worship Platform</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4318FF;
      --glow: rgba(67, 24, 255, 0.35);
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      background-color: #060a18;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      color: #fff;
      overflow: hidden;
      padding: 24px;
    }

    /* Animated background */
    .bg {
      position: fixed;
      top: -100px; left: -100px; right: -100px; bottom: -100px;
      z-index: 0;
      overflow: hidden;
      background-color: #060a18;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #4318FF, transparent 70%);
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7B5BFF, transparent 70%);
      bottom: -100px; right: -80px;
      animation-delay: 3s;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #1a0066, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 6s;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      text-align: center;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Icon */
    .icon-wrap {
      width: 88px; height: 88px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(67,24,255,0.2), rgba(67,24,255,0.08));
      border: 1px solid rgba(67,24,255,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      animation: iconPulse 3s ease-in-out infinite;
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 36px;
      background: radial-gradient(circle, rgba(67,24,255,0.15), transparent 70%);
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(67,24,255,0.3); }
      50% { box-shadow: 0 0 0 16px rgba(67,24,255,0); }
    }
    .icon-wrap svg { width: 40px; height: 40px; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(67,24,255,0.15);
      border: 1px solid rgba(67,24,255,0.3);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; font-weight: 700;
      color: #a89bff; letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #a89bff;
      animation: dotBlink 1.5s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      margin-bottom: 36px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Countdown / status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4318FF;
      box-shadow: 0 0 8px rgba(67,24,255,0.8);
      animation: dotBlink 2s ease-in-out infinite;
    }

    /* Retry button */
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #4318FF, #7B5BFF);
      box-shadow: 0 8px 32px rgba(67,24,255,0.4);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }
    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(67,24,255,0.5);
    }
    .btn-retry:active {
      transform: translateY(0);
    }

    /* Auto-check timer */
    .timer-text {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      font-weight: 500;
    }
    #countdown { color: rgba(255,255,255,0.5); font-weight: 700; }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Main card -->
  <div class="card">
    <!-- Icon -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(167,139,255,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <!-- Badge -->
    <div class="badge">
      <span class="badge-dot"></span>
      Ժամանակավոր դադար
    </div>

    <h1>Տեխնիկական<br>աշխատանքներ</h1>

    <p class="desc" id="mainMsg">
      Կայքում ընթացքի մեջ են տեխնիկական աշխատանքներ։<br>Խնդրում ենք փորձել մի փոքր հետո։
    </p>

    <div class="status-row">
      <div class="status-dot"></div>
      Թիմը աշխատում է — ամեն ինչ շուտ կլինի
    </div>
    
    <div class="status-row" id="endAtRow" style="display:none; color: #a89bff; font-weight: 700; font-size: 14px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      Հասանելի կլինի՝ <span id="endAtTimer" style="margin-left:4px;"></span>
    </div>

    <button class="btn-retry" onclick="checkStatus(); this.style.opacity='0.7'; setTimeout(() => this.style.opacity='1', 500);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Փորձել նորից
    </button>

    <div class="timer-text">
      Ավտոմատ ստուգում <span id="countdown">30</span> վայրկյանից
    </div>
  </div>

  <script>
    // Load initial message from URL param
    (function() {
      try {
        const params = new URLSearchParams(window.location.search);
        const msg = params.get('message');
        if (msg && msg.trim()) {
          document.getElementById('mainMsg').textContent = msg.trim();
        }
      } catch(e) {}
    })();

    let seconds = 30;
    const el = document.getElementById('countdown');
    
    function checkStatus() {
      fetch('/status.php?_=' + Date.now(), { cache: 'no-store' })
        .then(function(r) {
          return r.json().then(function(data) {
            return { ok: r.ok, status: r.status, data: data };
          }).catch(function() {
            return { ok: r.ok, status: r.status, data: null };
          });
        })
        .then(function(res) {
          // If maintenance is turned off
          if (res.ok || (res.data && res.data.maintenance === false)) {
            window.location.replace('/');
            return;
          }
          
          // If still in maintenance, update message dynamically if provided
          if (res.data && res.data.message) {
            document.getElementById('mainMsg').textContent = res.data.message;
            // Also update URL so manual refresh keeps the new message
            try {
              const url = new URL(window.location);
              url.searchParams.set('message', res.data.message);
              window.history.replaceState({}, '', url);
            } catch(e) {}
          }
          
          if (res.data && res.data.maintenance_end_at) {
            targetEndTime = new Date(res.data.maintenance_end_at).getTime();
            document.getElementById('endAtRow').style.display = 'flex';
            if (!endAtTimerInterval) {
              endAtTimerInterval = setInterval(updateEndAtTimer, 1000);
              updateEndAtTimer();
            }
          } else {
            targetEndTime = null;
            document.getElementById('endAtRow').style.display = 'none';
            if (endAtTimerInterval) {
              clearInterval(endAtTimerInterval);
              endAtTimerInterval = null;
            }
          }
          
          // Restart countdown
          seconds = 30;
          if (el) el.textContent = seconds;
          setTimeout(tick, 1000);
        })
        .catch(function(err) {
          // Network error - restart countdown
          seconds = 30;
          if (el) el.textContent = seconds;
          setTimeout(tick, 1000);
        });
    }

    function tick() {
      seconds--;
      if (el) el.textContent = seconds;
      if (seconds <= 0) {
        if (el) el.textContent = "0";
        checkStatus();
      } else {
        setTimeout(tick, 1000);
      }
    }

    let targetEndTime = null;
    let endAtTimerInterval = null;

    function updateEndAtTimer() {
      if (!targetEndTime) return;
      const now = new Date().getTime();
      const diff = targetEndTime - now;
      if (diff <= 0) {
        document.getElementById('endAtTimer').textContent = "Շուտով...";
        return;
      }
      
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);
      
      let timeString = "";
      if (hours > 0) timeString += hours + "ժ ";
      if (mins > 0 || hours > 0) timeString += mins + "ր ";
      timeString += secs + "վ";
      
      document.getElementById('endAtTimer').textContent = timeString;
    }

    // Call checkStatus immediately to fetch accurate info, 
    // then start the normal 30s polling cycle
    checkStatus();
  </script>
</body>
</html>
