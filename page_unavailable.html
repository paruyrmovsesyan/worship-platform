<!doctype html>
<html lang="hy">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Էջը ժամանակավորապես հասանելի չէ — Worship Platform</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/wolarmyouth.jpg" type="image/jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Worship Platform">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#070910">
  <script src="/loader.js" defer></script>
  <script src="/pwa-init.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4318FF;
      --glow: rgba(67, 24, 255, 0.35);
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #060a18;
      color: #fff;
      overflow: hidden;
      padding: 24px;
    }

    /* Animated background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #4318FF, transparent 70%);
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7B5BFF, transparent 70%);
      bottom: -100px; right: -80px;
      animation-delay: 3s;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #1a0066, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 6s;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      text-align: center;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Icon */
    .icon-wrap {
      width: 88px; height: 88px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(67,24,255,0.2), rgba(67,24,255,0.08));
      border: 1px solid rgba(67,24,255,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      animation: iconPulse 3s ease-in-out infinite;
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 36px;
      background: radial-gradient(circle, rgba(67,24,255,0.15), transparent 70%);
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(67,24,255,0.3); }
      50% { box-shadow: 0 0 0 16px rgba(67,24,255,0); }
    }
    .icon-wrap svg { width: 40px; height: 40px; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(67,24,255,0.15);
      border: 1px solid rgba(67,24,255,0.3);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; font-weight: 700;
      color: #a89bff; letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #a89bff;
      animation: dotBlink 1.5s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      margin-bottom: 36px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4318FF;
      box-shadow: 0 0 8px rgba(67,24,255,0.8);
      animation: dotBlink 2s ease-in-out infinite;
    }

    /* Actions */
    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #4318FF, #7B5BFF);
      box-shadow: 0 8px 32px rgba(67,24,255,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(67,24,255,0.5);
    }
    .btn-secondary {
      color: #fff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(0);
    }
    
    @media (max-width: 500px) {
      .actions-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(167,139,255,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
        <path d="M2 17l10 5 10-5"></path>
        <path d="M2 12l10 5 10-5"></path>
      </svg>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      <span id="modeEyebrow">Worship Platform</span>
    </div>

    <h1 id="pageTitle">Այս էջը հասանելի չէ</h1>

    <p class="desc" id="pageText">
      Այս պահին տվյալ բաժնի վրա կատարվում են տեխնիկական աշխատանքներ։ Խնդրում ենք փորձել մի փոքր ուշ կամ բացել մեկ այլ հասանելի բաժին։
    </p>

    <div class="status-row">
      <div class="status-dot"></div>
      <span id="messageText">Փակված է միայն այս բաժինը։ Մնացած էջերը աշխատում են։</span>
    </div>

    <div class="actions-grid">
      <a href="/" class="btn btn-primary" id="primaryAction">Գնալ գլխավոր էջ</a>
      <button class="btn btn-secondary" id="retryBtn">Փորձել նորից</button>
    </div>
  </div>

  <script>
    (function(){
      var params = new URLSearchParams(window.location.search);
      var source = (params.get("source") || "").toLowerCase();
      var mode = (params.get("mode") || "").toLowerCase();
      var page = (params.get("page") || "").toLowerCase();
      var message = params.get("message") || "";
      var isApp = source === "pwa" || source === "admin-app" || mode === "app" ||
        (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
        window.navigator.standalone === true;

      var labels = {
        landing: "գլխավոր էջը",
        main: "երգերի գրադարանը",
        song: "երգի դիտման էջը",
        favorites: "պահպանված երգերը",
        setlists: "սեթլիստների բաժինը",
        account: "հաշվի բաժինը",
        news: "նորությունների բաժինը",
        auth: "մուտք/գրանցման բաժինը"
      };

      var pageLabel = labels[page] || "այս բաժինը";
      document.body.classList.add(isApp ? "mode-app" : "mode-web");

      var modeEyebrow = document.getElementById("modeEyebrow");
      var pageTitle = document.getElementById("pageTitle");
      var pageText = document.getElementById("pageText");
      var scopeTitle = document.getElementById("scopeTitle");
      var scopeText = document.getElementById("scopeText");
      var helpText = document.getElementById("helpText");
      var messageText = document.getElementById("messageText");
      var primaryAction = document.getElementById("primaryAction");
      var retryBtn = document.getElementById("retryBtn");

      if(isApp){
        modeEyebrow.textContent = "Worship ծրագիր";
        pageTitle.textContent = "Այս էջը ծրագրում հասանելի չէ";
        pageText.textContent = "Այս պահին " + pageLabel + " փակված է ծրագրի համար։ Կարող ես օգտվել մյուս հասանելի բաժիններից կամ մի փոքր ուշ կրկին փորձել։";
        primaryAction.href = "/main.html?source=" + encodeURIComponent(source || "pwa");
        primaryAction.textContent = "Բացել երգերի բաժինը";
      } else {
        modeEyebrow.textContent = "Worship կայք";
        pageTitle.textContent = "Այս էջը կայքում հասանելի չէ";
        pageText.textContent = "Այս պահին " + pageLabel + " փակված է կայքի համար։ Կարող ես վերադառնալ գլխավոր էջ կամ մի փոքր ուշ կրկին փորձել։";
        primaryAction.href = "/";
        primaryAction.textContent = "Գնալ գլխավոր էջ";
      }

      if(message){
        messageText.textContent = message;
      } else {
        messageText.textContent = "Փակված է միայն " + pageLabel + "։ Մնացած էջերը աշխատում են։";
      }

      retryBtn.addEventListener("click", function(){
        window.location.reload();
      });
    })();
  </script>
</body>
</html>
