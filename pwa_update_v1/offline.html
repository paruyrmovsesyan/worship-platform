<!doctype html>
<html lang="hy">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="apple-touch-icon" href="/wolarm_youth.png">
<meta name="theme-color" content="#070910">
<title>Offline — Worship Platform</title>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    font-family:Inter,system-ui,sans-serif;
    background:radial-gradient(circle at top,#141a33,#05070c 70%);
    color:#f0f1f6;
    text-align:center;
    padding:24px;
  }
  .card{
    max-width:420px;
    background:rgba(18,24,32,.7);
    border:1px solid rgba(255,255,255,.12);
    border-radius:16px;
    padding:24px;
  }
  h1{margin:0 0 10px;font-size:24px;color:#f6c87a}
  p{margin:0 0 14px;line-height:1.5}
  a{
    display:inline-block;
    margin-top:8px;
    color:#fff;
    text-decoration:none;
    font-weight:700;
    background:linear-gradient(135deg,#6b4eff,#f6c87a);
    padding:10px 16px;
    border-radius:10px;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Դուք անցանց եք</h1>
    <p>Ինտերնետ կապը հասանելի չէ։ Երբ կապը վերականգնվի, էջը թարմացրեք։</p>
    <a href="/">Գնալ գլխավոր էջ</a>
  </main>
</body>
</html>
