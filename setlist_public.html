  <script type="module">

    import { initNavbarAuthUI } from '/fav_bridge.js';

    function initMobileMenuDrawer(){
      const hamburger = document.getElementById('hamburger');
      const menu = document.getElementById('menu');
      if(!hamburger || !menu || hamburger.dataset.drawerBound === '1') return;
      hamburger.dataset.drawerBound = '1';

      let backdrop = document.querySelector('.mobile-nav-backdrop');
      if(!backdrop){
        backdrop = document.createElement('div');
        backdrop.className = 'mobile-nav-backdrop';
        document.body.appendChild(backdrop);
      }

      const finishClose = () => menu.classList.remove('closing');
      const closeMenu = (animated = true) => {
        hamburger.classList.remove('active');
        document.body.classList.remove('menu-open');
        menu.classList.remove('open');
        if(animated){
          menu.classList.add('closing');
          window.setTimeout(finishClose, 260);
        } else {
          finishClose();
        }
      };
      const openMenu = () => {
        menu.classList.remove('closing');
        menu.classList.add('open');
        hamburger.classList.add('active');
        document.body.classList.add('menu-open');
      };

      hamburger.addEventListener('click', ()=>{
        if(window.innerWidth > 900) return;
        if(menu.classList.contains('open')) closeMenu(false);
        else openMenu();
      });

      backdrop.addEventListener('click', ()=> closeMenu(false));
      menu.querySelectorAll('a').forEach(link => link.addEventListener('click', ()=> closeMenu(true)));
      window.addEventListener('resize', ()=> {
        if(window.innerWidth > 900) closeMenu(false);
      });
      document.addEventListener('keydown', (event)=>{
        if(event.key === 'Escape' && menu.classList.contains('open')) closeMenu(false);
      });
    }

    initMobileMenuDrawer();

    function formatServiceDate(value){
      if(!value) return '—';
      const parsed = new Date(value);
      if(Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString('hy-AM', {
        year:'numeric',
        month:'short',
        day:'numeric'
      });
    }

    function escapeHtml(str){
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    const capoAskModal = document.getElementById('capoAskModal');
const capoAskSongTitle = document.getElementById('capoAskSongTitle');
const capoAskEnabled = document.getElementById('capoAskEnabled');
const capoAskValue = document.getElementById('capoAskValue');
const capoAskCancelBtn = document.getElementById('capoAskCancelBtn');
const capoAskOpenBtn = document.getElementById('capoAskOpenBtn');

let pendingSongOpen = null;

function getSongCapoStorageKey(songId){
  return `song_capo_pref:${songId}`;
}

function loadSongCapoPref(songId){
  try{
    const raw = localStorage.getItem(getSongCapoStorageKey(songId));
    if(!raw) return { capo: 0, capo_mode: 0 };

    const data = JSON.parse(raw);
    return {
      capo: Math.max(0, Math.min(12, parseInt(data?.capo || '0', 10) || 0)),
      capo_mode: Number(data?.capo_mode || 0) === 1 ? 1 : 0
    };
  }catch(e){
    console.error('loadSongCapoPref error', e);
    return { capo: 0, capo_mode: 0 };
  }
}

function saveSongCapoPref(songId, capo, capoMode){
  const payload = {
    capo: Math.max(0, Math.min(12, parseInt(capo || '0', 10) || 0)),
    capo_mode: capoMode ? 1 : 0
  };

  localStorage.setItem(getSongCapoStorageKey(songId), JSON.stringify(payload));
}

function isStandaloneProgramMode(){
  try{
    const source = (new URL(window.location.href).searchParams.get('source') || '').toLowerCase();
    if(source === 'pwa' || source === 'admin-app') return true;
  }catch(e){}
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

function withProgramSource(path){
  const url = new URL(path, window.location.origin);
  if(isStandaloneProgramMode() && url.origin === window.location.origin){
    url.searchParams.set('source', 'pwa');
  }
  return url;
}

function openSong(songId, targetKey, songTitle = ''){
  if(!songId) return;

  pendingSongOpen = {
    songId: Number(songId),
    targetKey: targetKey || '',
    songTitle: songTitle || 'Երգ'
  };

  const savedPref = loadSongCapoPref(songId);

  capoAskSongTitle.textContent = pendingSongOpen.songTitle;

  if(savedPref.capo_mode === 1 && savedPref.capo > 0){
    capoAskEnabled.checked = true;
    capoAskValue.value = String(savedPref.capo);
  } else {
    capoAskEnabled.checked = false;
    capoAskValue.value = '0';
  }

  capoAskValue.disabled = !capoAskEnabled.checked;
  capoAskModal.classList.add('show');
}

capoAskEnabled?.addEventListener('change', () => {
  capoAskValue.disabled = !capoAskEnabled.checked;

  if(!capoAskEnabled.checked){
    capoAskValue.value = '0';
  } else if(capoAskValue.value === '0'){
    capoAskValue.value = '1';
  }
});

capoAskCancelBtn?.addEventListener('click', () => {
  capoAskModal.classList.remove('show');
  pendingSongOpen = null;
});

capoAskModal?.addEventListener('click', (e) => {
  if(e.target === capoAskModal){
    capoAskModal.classList.remove('show');
    pendingSongOpen = null;
  }
});

capoAskOpenBtn?.addEventListener('click', () => {
  if(!pendingSongOpen || !pendingSongOpen.songId) return;

  const songId = pendingSongOpen.songId;
  const useCapo = capoAskEnabled.checked;
  const capo = useCapo ? (parseInt(capoAskValue.value || '0', 10) || 0) : 0;

  if(useCapo && capo > 0){
    saveSongCapoPref(songId, capo, 1);
  } else {
    saveSongCapoPref(songId, 0, 0);
  }

  const url = withProgramSource('/song_view.html');
  url.searchParams.set('id', String(songId));

  if(pendingSongOpen.targetKey){
    url.searchParams.set('tkey', String(pendingSongOpen.targetKey));
  }

  if(capo > 0){
    url.searchParams.set('capo', String(capo));
    url.searchParams.set('capo_mode', '1');
  } else {
    url.searchParams.set('capo_mode', '0');
  }

  capoAskModal.classList.remove('show');
  pendingSongOpen = null;

  window.location.href = url.toString();
});

    async function loadPublicSetlist(){
      if(!token){
        setlistName.textContent = 'Սխալ հղում';
        window.WP?.releaseLoader?.(loaderHoldKey, 60);
        return;
      }

      try{
        const res = await fetch('/setlists_api.php?action=get_public_setlist&token=' + encodeURIComponent(token));
        const data = await res.json();

        if(!res.ok || data.error){
          throw new Error(data.error || 'Չհաջողվեց բեռնել');
        }

        const setlist = data.setlist || {};
        const items = Array.isArray(data.items) ? data.items : [];
        const songsCount = items.filter(item => item.item_type !== 'section').length;
        const requiredCount = items.filter(item => item.item_type !== 'section' && Number(item.is_required)).length;

        setlistName.textContent = setlist.name || 'Անանուն սեթլիստ';
        setlistDescription.textContent = setlist.description || 'Նկարագրություն չկա';
        setlistType.textContent = setlist.service_type || '—';
        setlistDate.textContent = formatServiceDate(setlist.service_date || '');
        if(summaryItemsCount) summaryItemsCount.textContent = String(items.length);
        if(summarySongsCount) summarySongsCount.textContent = String(songsCount);
        if(summaryRequiredCount) summaryRequiredCount.textContent = String(requiredCount);

        if(!items.length){
          itemsList.innerHTML = '<div class="song-row">Դեռ ոչ մի item չկա</div>';
          return;
        }

        itemsList.innerHTML = items.map(item => {
          if(item.item_type === 'section'){
            return `<div class="section-row">${escapeHtml(item.title || 'Բաժին')}</div>`;
          }

          return `
            <div class="song-row">
             <div class="song-title song-link-title"
     data-song-id="${Number(item.song_id || 0)}"
     data-target-key="${escapeHtml(item.target_key || item.original_key || '')}"
     data-song-title="${escapeHtml(item.song_title || item.title || ('Song #' + item.song_id))}">
  ${escapeHtml(item.song_title || item.title || ('Song #' + item.song_id))}
</div>

              <div class="muted" style="font-size:13px;">
                Տոն: ${escapeHtml(item.target_key || item.original_key || '—')} |
                Կատարող: ${escapeHtml(item.song_artist || '—')}
                ${Number(item.is_required) ? ' | ★ Պարտադիր' : ''}
              </div>

              ${item.notes ? `<div style="margin-top:8px;" class="muted">${escapeHtml(item.notes)}</div>` : ''}
            </div>
          `;
        }).join('');
        itemsList.querySelectorAll('.song-link-title').forEach(el => {
  el.addEventListener('click', () => {
    openSong(
      Number(el.dataset.songId || '0'),
      el.dataset.targetKey || '',
      el.dataset.songTitle || 'Երգ'
    );
  });
});
      }catch(err){
        setlistName.textContent = 'Չհաջողվեց բեռնել setlist-ը';
        setlistDescription.textContent = err.message;
      }finally{
        window.WP?.releaseLoader?.(loaderHoldKey, 60);
      }
    }

    loadPublicSetlist();
  </script>
</body>
</html>
