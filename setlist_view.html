  <style>
    :root{
      --bg:#0b1020;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.08);
      --text:#eef3ff;
      --muted:#9aa6c7;
      --accent:#3367ff;
      --accent2:#2247d6;
      --danger:#c83d4c;
      --danger2:#a52836;
      --radius:16px;
      --shadow:0 10px 28px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:radial-gradient(circle at top,#141a33,#05070c 70%);
      color:var(--text);
    }

    .wrap{
      max-width:1240px;
      margin:0 auto;
      padding:84px 18px 28px;
    }

    .stack{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px) saturate(120%);
    }

    .card-body{
      padding:20px;
    }

    .topbar{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:16px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .title{
      font-size:24px;
      font-weight:800;
      margin:0 0 6px;
    }

    .muted{
      color:var(--muted);
    }

    .meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .summary-strip{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin:16px 0 18px;
    }

    .summary-card{
      padding:15px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
    }

    .summary-card strong{
      display:block;
      margin-top:6px;
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .items-toolbar{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(240px,320px);
      align-items:end;
      gap:14px;
      margin-bottom:14px;
    }

    .toolbar-search{
      max-width:320px;
      width:100%;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.06);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button, .btn, input, textarea{
      font:inherit;
    }

    button, .btn{
      border:0;
      border-radius:12px;
      padding:11px 14px;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      font-weight:700;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    button.secondary, .btn.secondary{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
    }

    button.danger{
      background:linear-gradient(135deg,var(--danger),var(--danger2));
    }

    input, textarea, select{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  color:var(--text);
  border-radius:12px;
  padding:12px 14px;
  outline:none;
}

select{
  -webkit-appearance:none;
  appearance:none;
}

select option{
  background:#111827;
  color:#eef3ff;
}

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      align-items:start;
    }

    .grid-2-tight{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .items-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .song-row,.section-row{
      border-radius:14px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.03);
      position:relative;
    }

    .song-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:14px;
      align-items:flex-start;
      padding:15px;
      transition:border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .song-row:hover{
      background:rgba(255,255,255,.045);
      border-color:rgba(92,126,255,.22);
      transform:translateY(-1px);
    }

    .song-main{
      min-width:0;
      flex:1;
    }

    .song-title{
      font-weight:800;
      margin-bottom:6px;
      word-break:break-word;
    }

    .song-link-title{
      cursor:pointer;
    }

    .song-link-title:hover{
      color:#9fc0ff;
    }

    .song-sub{
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .section-row{
      padding:15px;
      background:rgba(107,78,255,.12);
      border-color:rgba(107,78,255,.22);
      font-weight:800;
    }

    .empty{
      padding:20px;
      border:1px dashed rgba(255,255,255,.12);
      border-radius:14px;
      color:var(--muted);
      text-align:center;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      flex:0 0 auto;
      align-items:center;
    }

    .small-btn{
      padding:9px 12px;
      border-radius:10px;
      font-size:13px;
    }

    .search-song-item{
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.03);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }

    .search-song-main{
      min-width:0;
      flex:1;
    }

    .search-song-title{
      font-weight:800;
      margin-bottom:4px;
    }

    .search-song-meta{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .search-empty{
      padding:12px;
      border-radius:12px;
      color:var(--muted);
      background:rgba(255,255,255,.03);
      border:1px dashed rgba(255,255,255,.08);
    }


    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    @media (max-width:900px){
      .topbar,
      .items-toolbar,
      .grid-2,
      .grid-2-tight{
        grid-template-columns:1fr;
      }

      .summary-strip{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width:760px){
      .wrap{
        padding:78px 12px 18px;
      }

      .card-body{
        padding:16px;
      }

      .song-row{
        grid-template-columns:1fr;
      }

      .item-actions{
        width:100%;
        justify-content:stretch;
      }

      .item-actions button,
      .item-actions a{
        flex:1;
      }

      .item-edit-grid-4{
        grid-template-columns:1fr;
      }

      .actions{
        width:100%;
      }

      .actions button{
        flex:1 1 calc(50% - 8px);
      }
    }
    

.required-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(255,107,107,.14);
  color:#ffb3b3;
  border:1px solid rgba(255,107,107,.22);
  font-size:12px;

.share-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  line-height:1;
  border:1px solid transparent;
}

.share-on{
  background:rgba(34,197,94,.14);
  color:#9ff0b5;
  border-color:rgba(34,197,94,.22);
}

.share-off{
  background:rgba(255,107,107,.14);
  color:#ffb3b3;
  border-color:rgba(255,107,107,.22);
}

.icon-only-mobile{
  width:auto;
  min-width:auto;
}

.btn-ico{
  display:none;
  align-items:center;
  justify-content:center;
  font-size:18px;
  line-height:1;
}

.btn-text{
  display:inline;
}

@media (max-width:768px){
  .icon-only-mobile{
    width:42px;
    height:42px;
    padding:0;
    border-radius:12px;
  }

  .icon-only-mobile .btn-text{
    display:none;
  }

  .icon-only-mobile .btn-ico{
    display:inline-flex;
  }
}

.setlist-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:100001;
  padding:16px;
}

.setlist-modal.show{
  display:flex !important;
}

.setlist-modal-box{
  width:100%;
  max-width:420px;
  border-radius:18px;
  padding:20px;
  background:linear-gradient(180deg,rgba(18,24,32,.96),rgba(18,24,32,.9));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
.setlist-check{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--muted);
  font-size:14px;
  font-weight:600;
}

.setlist-check input{
  width:18px;
  height:18px;
  flex:0 0 auto;
}

.setlist-check span{
  display:inline-block;
  line-height:1.4;
}

    @media (max-width:520px){
      .summary-strip{
        grid-template-columns:1fr;
      }

      .actions button,
      .item-actions button,
      .item-actions a{
        flex:1 1 100%;
      }

      .title{
        font-size:22px;
      }
    }
  </style>
</head>

    import { initNavbarAuthUI } from '/fav_bridge.js';

    function initMobileMenuDrawer(){
      const hamburger = document.getElementById('hamburger');
      const menu = document.getElementById('menu');
      if(!hamburger || !menu || hamburger.dataset.drawerBound === '1') return;
      hamburger.dataset.drawerBound = '1';

      let backdrop = document.querySelector('.mobile-nav-backdrop');
      if(!backdrop){
        backdrop = document.createElement('div');
        backdrop.className = 'mobile-nav-backdrop';
        document.body.appendChild(backdrop);
      }

      const finishClose = () => menu.classList.remove('closing');
      const closeMenu = (animated = true) => {
        hamburger.classList.remove('active');
        document.body.classList.remove('menu-open');
        menu.classList.remove('open');
        if(animated){
          menu.classList.add('closing');
          window.setTimeout(finishClose, 260);
        } else {
          finishClose();
        }
      };
      const openMenu = () => {
        menu.classList.remove('closing');
        menu.classList.add('open');
        hamburger.classList.add('active');
        document.body.classList.add('menu-open');
      };

      hamburger.addEventListener('click', ()=>{
        if(window.innerWidth > 900) return;
        if(menu.classList.contains('open')) closeMenu(false);
        else openMenu();
      });

      backdrop.addEventListener('click', ()=> closeMenu(false));
      menu.querySelectorAll('a').forEach(link => link.addEventListener('click', ()=> closeMenu(true)));
      window.addEventListener('resize', ()=> {
        if(window.innerWidth > 900) closeMenu(false);
      });
      document.addEventListener('keydown', (event)=>{
        if(event.key === 'Escape' && menu.classList.contains('open')) closeMenu(false);
      });
    }

    initMobileMenuDrawer();

    const $ = (id) => document.getElementById(id);

    const params = new URLSearchParams(window.location.search);
    const setlistPicker = $('setlistPicker');

    let currentSetlists = [];

    const itemsList = $('itemsList');
    const setlistName = $('setlistName');

    function isStandaloneProgramMode(){
      try{
        const source = (new URL(window.location.href).searchParams.get('source') || '').toLowerCase();
        if(source === 'pwa' || source === 'admin-app') return true;
      }catch(e){}
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function withProgramSource(path){
      const url = new URL(path, window.location.origin);
      if(isStandaloneProgramMode() && url.origin === window.location.origin){
        url.searchParams.set('source', 'pwa');
      }
      return url;
    }

    function getStatusLabel(status){
      return status === 'archived' ? 'Արխիվ' : 'Ակտիվ';
    }

    function formatServiceDate(value){
      if(!value) return 'Ամսաթիվ չկա';
      const parsed = new Date(value);
      if(Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString('hy-AM', {
        year:'numeric',
        month:'short',
        day:'numeric'
      });
    }

    function getVisibleItems(){
      const query = currentItemSearch.trim().toLowerCase();
      if(!query) return currentItems;
      return currentItems.filter(item => {
        const haystack = `${item.title || ''} ${item.song_title || ''} ${item.song_artist || ''} ${item.notes || ''} ${item.target_key || ''} ${item.original_key || ''}`.toLowerCase();
        return haystack.includes(query);
      });
    }

    async function api(action, method = 'GET', data = null, query = null){
      const url = new URL('/setlists_api.php', window.location.origin);
      url.searchParams.set('action', action);

      if(query && typeof query === 'object'){
        for(const [k, v] of Object.entries(query)){
          if(v !== undefined && v !== null && v !== ''){
            url.searchParams.set(k, String(v));
          }
        }
      }

      const opts = {
        method,
        credentials: 'include',
        headers: {}
      };

      if(data){
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(data);
      }

      const res = await fetch(url.toString(), opts);
      const json = await res.json().catch(() => ({}));

      if(!res.ok || json.error){
        throw new Error(json.error || ('HTTP ' + res.status));
      }

      return json;
    }

    function escapeHtml(str){
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function openSongFromSetlist(item){
  if(!item || !item.song_id) return;

  pendingSongOpenItem = item;

  const savedPref = loadSongCapoPref(item.song_id);
  const setlistCapo = Math.max(0, Math.min(12, parseInt(item.capo || '0', 10) || 0));

  capoAskSongTitle.textContent = item.song_title || item.title || 'Երգ';

  if(savedPref.capo_mode === 1 && savedPref.capo > 0){
    capoAskEnabled.checked = true;
    capoAskValue.value = String(savedPref.capo);
  } else if(setlistCapo > 0){
    capoAskEnabled.checked = true;
    capoAskValue.value = String(setlistCapo);
  } else {
    capoAskEnabled.checked = false;
    capoAskValue.value = '0';
  }

  capoAskValue.disabled = !capoAskEnabled.checked;
  capoAskModal.classList.add('show');
}

    function renderSetlist(){
  if(!currentSetlist){
    setlistName.textContent = 'Սեթլիստ չի գտնվել';
    setlistDescription.textContent = '';
    setlistStatus.textContent = '—';
    setlistType.textContent = '—';
    setlistDate.textContent = '—';
    itemsCount.textContent = '0 միավոր';
    if(summaryItemsCount) summaryItemsCount.textContent = '0';
    if(summarySongsCount) summarySongsCount.textContent = '0';
    if(summarySectionsCount) summarySectionsCount.textContent = '0';
    if(summaryRequiredCount) summaryRequiredCount.textContent = '0';
    itemsList.innerHTML = '<div class="empty">Չհաջողվեց բեռնել սեթլիստը</div>';
    return;
  }

  setlistName.textContent = currentSetlist.name || 'Անանուն սեթլիստ';
  setlistDescription.textContent = currentSetlist.description || 'Նկարագրություն չկա';
  setlistStatus.textContent = getStatusLabel(currentSetlist.status || 'active');
  setlistType.textContent = currentSetlist.service_type || '—';
  setlistDate.textContent = formatServiceDate(currentSetlist.service_date || '');
  itemsCount.textContent = `${currentItems.length} միավոր`;

  const songsCount = currentItems.filter(item => item.item_type !== 'section').length;
  const sectionsCount = currentItems.filter(item => item.item_type === 'section').length;
  const requiredCount = currentItems.filter(item => item.item_type !== 'section' && Number(item.is_required)).length;
  if(summaryItemsCount) summaryItemsCount.textContent = String(currentItems.length);
  if(summarySongsCount) summarySongsCount.textContent = String(songsCount);
  if(summarySectionsCount) summarySectionsCount.textContent = String(sectionsCount);
  if(summaryRequiredCount) summaryRequiredCount.textContent = String(requiredCount);

  const visibleItems = getVisibleItems();

  if(!visibleItems.length){
    itemsList.innerHTML = `<div class="empty">${currentItems.length ? 'Այս որոնումով ոչինչ չի գտնվել' : 'Այս սեթլիստում դեռ item չկա'}</div>`;
    return;
  }

  itemsList.innerHTML = visibleItems.map(item => {
    if(item.item_type === 'section'){
      return `
        <div class="section-row">
          ${escapeHtml(item.title || 'Բաժին')}
        </div>
      `;
    }

    const title = item.song_title || item.title || ('Song #' + item.song_id);
    const shownKey = item.target_key || item.original_key || '—';
    const artist = item.song_artist || '—';

    return `
      <div class="song-row clickable" data-item-id="${Number(item.id)}">
        <div class="song-main">
          <div class="song-title">${escapeHtml(title)}</div>

          <div class="song-sub">
            <span>Սկզբնական: ${escapeHtml(item.original_key || '—')}</span>
            <span>Թիրախ: ${escapeHtml(shownKey)}</span>
            <span>Կատարող: ${escapeHtml(artist)}</span>
            ${Number(item.is_required) ? `<span class="required-badge">★ Պարտադիր</span>` : ''}
          </div>

          ${item.notes ? `
            <div style="margin-top:10px; color:var(--muted); font-size:13px;">
              ${escapeHtml(item.notes)}
            </div>
          ` : ''}
        </div>

        <div class="item-actions">
          <button class="secondary small-btn" type="button" onclick="window.openSongByItem(${Number(item.id)})">
            Բացել
          </button>
        </div>
      </div>
    `;
  }).join('');

  itemsList.querySelectorAll('.song-row.clickable').forEach(row => {
    row.addEventListener('click', (e) => {
      if(e.target.closest('button')) return;
      const itemId = Number(row.dataset.itemId || '0');
      const item = currentItems.find(x => Number(x.id) === itemId);
      openSongFromSetlist(item);
    });
  });
}

    function renderSongSearchResults(rows){
      songSearchResults.innerHTML = '';

      if(!songSearchInput.value.trim()) return;

      if(!rows.length){
        songSearchResults.innerHTML = `<div class="search-empty">Ոչինչ չի գտնվել</div>`;

              <span>${escapeHtml(song.artist || '—')}</span>
              <span>Key: ${escapeHtml(song.song_key || '—')}</span>
              ${song.tags ? `<span>${escapeHtml(song.tags)}</span>` : ''}

          <button type="button" onclick="window.addSongFromSearch(${song.id})">Ավելացնել</button>

    async function searchSongs(query){

        renderSongSearchResults([]);

      }catch(err){
        console.error(err);
        songSearchResults.innerHTML = `<div class="search-empty">Չհաջողվեց որոնել</div>`;
      }
    }

    async function loadSetlist(){
  if(!currentSetlistId){
    setlistName.textContent = 'Ընտրիր սեթլիստ';
    setlistDescription.textContent = '';
    setlistStatus.textContent = '—';

setlistPicker?.addEventListener('change', async () => {
  const nextId = Number(setlistPicker.value || '0');
  if(!nextId) return;

  currentSetlistId = nextId;

  const url = new URL(window.location.href);
  url.searchParams.set('id', String(currentSetlistId));
  window.history.replaceState({}, '', url);

  await loadSetlist();
});


async function loadSetlistsList(){
  const rows = await api('get_setlists', 'GET');
  currentSetlists = Array.isArray(rows) ? rows : [];
  currentSetlists.sort((a, b) => {
    const aArchived = a.status === 'archived' ? 1 : 0;
    const bArchived = b.status === 'archived' ? 1 : 0;
    if(aArchived !== bArchived) return aArchived - bArchived;
    return 0;
  });
  renderSetlistPicker();
}

function renderSetlistPicker(){
  if(!setlistPicker) return;

  if(!currentSetlists.length){
    setlistPicker.innerHTML = '<option value="">Սեթլիստ չկա</option>';
    return;
  }

  if(!currentSetlistId){
  setlistName.textContent = 'Ընտրիր սեթլիստ';

  setlistStatus.textContent = '—';
  setlistType.textContent = '—';
  setlistDate.textContent = '—';
  itemsCount.textContent = '0 միավոր';

}

      ${escapeHtml(item.name || 'Անանուն սեթլիստ')}
    </option>
  `).join('');
}

    
    async function reorderItemsInMemory(draggedId, targetId){
      const list = [...currentItems];
      const fromIndex = list.findIndex(x => Number(x.id) === Number(draggedId));
      const toIndex = list.findIndex(x => Number(x.id) === Number(targetId));

      if(fromIndex < 0 || toIndex < 0) return;

      const [moved] = list.splice(fromIndex, 1);
      list.splice(toIndex, 0, moved);

      const payload = list.map((item, index) => ({
        id: Number(item.id),
        position: index + 1
      }));

      try{
        await api('reorder_setlist_items', 'POST', {
          setlist_id: currentSetlistId,
          items: payload
        });

        currentItems = list.map((item, index) => ({
          ...item,
          position: index + 1
        }));

        renderSetlist();
        showMiniMessage('Հերթականությունը պահպանվեց');
      }catch(err){
        alert(err.message);
        await loadSetlist();
      }
    }

    function showMiniMessage(text){
      const old = document.getElementById('miniMsg');
      if(old) old.remove();

      const div = document.createElement('div');
      div.id = 'miniMsg';
      div.textContent = text;
      div.style.position = 'fixed';
      div.style.right = '20px';
      div.style.bottom = '20px';
      div.style.padding = '12px 14px';
      div.style.borderRadius = '12px';
      div.style.background = 'rgba(20,28,36,.94)';
      div.style.color = '#fff';
      div.style.border = '1px solid rgba(255,255,255,.08)';
      div.style.boxShadow = '0 10px 24px rgba(0,0,0,.25)';
      div.style.zIndex = '99999';
      div.style.fontWeight = '700';
      document.body.appendChild(div);

      setTimeout(() => div.remove(), 1800);
    }

capoAskOpenBtn?.addEventListener('click', () => {
  if(!pendingSongOpenItem || !pendingSongOpenItem.song_id) return;

  const songId = Number(pendingSongOpenItem.song_id);
  const useCapo = capoAskEnabled.checked;
  const capo = useCapo ? (parseInt(capoAskValue.value || '0', 10) || 0) : 0;

  if(useCapo && capo > 0){
    saveSongCapoPref(songId, capo, 1);
  } else {
    saveSongCapoPref(songId, 0, 0);
  }

  const url = withProgramSource('/song_view.html');
  url.searchParams.set('id', String(songId));

  if(pendingSongOpenItem.target_key){
    url.searchParams.set('tkey', pendingSongOpenItem.target_key);
  }

  if(capo > 0){
    url.searchParams.set('capo', String(capo));
    url.searchParams.set('capo_mode', '1');
  } else {
    url.searchParams.set('capo_mode', '0');
  }

  url.searchParams.set('setlist_id', String(currentSetlistId));

  capoAskModal.classList.remove('show');
  pendingSongOpenItem = null;

  window.location.href = url.toString();
});

      prompt('Պատճենի՛ր հղումը', currentShareUrl);
    }

    await refreshShareStatus();
  }catch(err){
    alert(err.message);
  }
});

document.getElementById('copyShareBtn')?.addEventListener('click', async () => {
  if(!currentShareUrl) return;

  try{
    await navigator.clipboard.writeText(currentShareUrl);
    showMiniMessage('Հղումը պատճենվեց');
  }catch(e){
    prompt('Պատճենի՛ր հղումը', currentShareUrl);
  }
});

document.getElementById('disableShareBtn')?.addEventListener('click', async () => {
  try{
    await api('disable_share_link', 'POST', { setlist_id: currentSetlistId });
    currentShareUrl = null;
    await refreshShareStatus();
    showMiniMessage('Հասանելիությունը փակվեց');
  }catch(err){
    alert(err.message);
  }
});

    document.getElementById('editBtn')?.addEventListener('click', () => {
  window.location.href = withProgramSource('/setlists.html?edit=' + encodeURIComponent(currentSetlistId)).toString();
});


    function getSongCapoStorageKey(songId){
  return `song_capo_pref:${songId}`;
}

function loadSongCapoPref(songId){
  try{
    const raw = localStorage.getItem(getSongCapoStorageKey(songId));
    if(!raw) return { capo: 0, capo_mode: 0 };

    const data = JSON.parse(raw);
    return {
      capo: Math.max(0, Math.min(12, parseInt(data?.capo || '0', 10) || 0)),
      capo_mode: Number(data?.capo_mode || 0) === 1 ? 1 : 0
    };
  }catch(e){
    console.error('loadSongCapoPref error', e);
    return { capo: 0, capo_mode: 0 };
  }
}

function saveSongCapoPref(songId, capo, capoMode){
  const payload = {
    capo: Math.max(0, Math.min(12, parseInt(capo || '0', 10) || 0)),
    capo_mode: capoMode ? 1 : 0
  };

  localStorage.setItem(getSongCapoStorageKey(songId), JSON.stringify(payload));
}

function clearSongCapoPref(songId){
  localStorage.removeItem(getSongCapoStorageKey(songId));
}
  </script>
