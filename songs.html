<!doctype html>
<html lang="hy">
<head>
<meta charset="utf-8">
<title>Loading...</title>
<script>
(function(){
  // Փորձենք պարզել արդյոք բրաուզերը նոր է
  var isOld = false;

  try {
    // Ստուգում ենք արդյոք ES6 հատկությունները կան
    new Function("let a = 1;");
  } catch (e) {
    isOld = true; // եթե չի աջակցում 'let', ուրեմն հին է
  }

  // Ստուգում ենք fetch առկայությունը
  if (typeof fetch === "undefined") {
    isOld = true;
  }

  // Ստուգում ենք Promise առկայությունը
  if (typeof Promise === "undefined") {
    isOld = true;
  }

  // Safari 5 / iPad 1 հատուկ ստուգում
  var ua = navigator.userAgent || "";
  if (ua.match(/CPU OS 5_|iPad;.*CPU OS 5/)) {
    isOld = true;
  }

  // Ուղղորդում ըստ արդյունքի
  if (isOld) {
    window.location.replace("songs_old.php");
  } else {
    window.location.replace("songs.php");
  }
})();
</script>
</head>
<body>
<h3 style="font-family:sans-serif;text-align:center;padding-top:40px;">Բեռնվում է...</h3>
</body>
</html>
